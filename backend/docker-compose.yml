services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: medarchive
      POSTGRES_PASSWORD: medarchive
      POSTGRES_DB: medarchive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medarchive"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql+psycopg2://medarchive:medarchive@postgres:5432/medarchive
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/storage
    volumes:
      - .:/app
      - storage:/data/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+psycopg2://medarchive:medarchive@postgres:5432/medarchive
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /data/storage
    volumes:
      - .:/app
      - storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  storage:
