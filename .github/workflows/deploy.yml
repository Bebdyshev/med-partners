name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (pull + rebuild on the server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ~/test
            git pull --ff-only
            cd deploy
            # OPENAI_API_KEY + passwords live in deploy/.env on the server (not in git).
            # Data layer + OpenAI-backed API & worker (no local ML / torch in the image).
            docker compose -f docker-compose.prod.yml up -d --build postgres redis api worker
            docker compose -f docker-compose.prod.yml ps
